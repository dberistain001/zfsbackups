# One file per ZFS dataset. The parser accepts only these known KEY=value keys;
# it does not execute shell code.

ENABLED=true

# Friendly name used in logs and state filenames.
NAME=home-newdataset

# Preferred form: pool/dataset, for example tank/home/newdataset.
# An exact ZFS mountpoint such as /home/zfs/newdataset is also accepted.
SOURCE=/home/zfs/newdataset

# Create a snapshot whenever this many minutes have elapsed since the last
# successful snapshot. The systemd timer checks all configs once per minute.
INTERVAL_MINUTES=15

# Retention policy:
#   - keep every managed interval snapshot created today;
#   - keep the newest snapshot from each of the previous DAILY_KEEP days;
#   - then the newest snapshot from each ISO week for WEEKLY_KEEP weeks;
#   - then the newest snapshot from each calendar month for MONTHLY_KEEP months.
DAILY_KEEP=7
WEEKLY_KEEP=8
MONTHLY_KEEP=12

# true snapshots descendant datasets too and destroys matching descendants
# during retention. false snapshots only the configured dataset.
RECURSIVE=false

# Only snapshots beginning with this prefix are managed or deleted.
SNAPSHOT_PREFIX=zfsbackup
